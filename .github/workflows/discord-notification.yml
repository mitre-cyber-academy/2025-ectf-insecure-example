name: Discord Notification

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  issues:
    types: [ opened, closed, reopened ]
  issue_comment:
    types: [ created ]
  pull_request_review:
    types: [ submitted ]
  project_card:
    types: [ created, moved ]
  # Add any other GitHub events you want to track

jobs:
  discord_notification:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      # If this is an issue comment event, get the issue details
      - name: Get latest comment
        id: get_comment
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueNumber = context.payload.issue.number;
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              per_page: 1,
              sort: 'created',
              direction: 'desc'
            });
            
            let lastComment = "No comments found";
            if (comments.data.length > 0) {
              // Limit comment length to avoid extremely long messages
              const commentBody = comments.data[0].body;
              lastComment = commentBody.length > 300 
                ? commentBody.substring(0, 300) + "..." 
                : commentBody;
            }
            
            core.setOutput('last_comment', lastComment);
            core.setOutput('comment_url', comments.data.length > 0 ? comments.data[0].html_url : context.payload.issue.html_url);
        
      - name: Discord notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          LAST_COMMENT: ${{ steps.get_comment.outputs.last_comment || '' }}
          COMMENT_URL: ${{ steps.get_comment.outputs.comment_url || '' }}
        uses: Ilshidur/action-discord@master
        if: github.event_name != 'project_card' || contains(github.event.project_card.note, 'done') || contains(github.event.project_card.column_name, 'Done')
        with:
          args: |
            📣 **New GitHub Activity**
            
            Repository: ${{ github.repository }}
            Event: ${{ github.event_name }}
            
            ${{ github.event_name == 'push' && format('**Branch:** {0}', github.ref_name) || '' }}
            ${{ github.event_name == 'pull_request' && format('**PR:** [{0}]({1}) - {2}', github.event.pull_request.title, github.event.pull_request.html_url, github.event.pull_request.state) || '' }}
            ${{ github.event_name == 'issues' && format('**Issue:** [{0}]({1}) - {2}', github.event.issue.title, github.event.issue.html_url, github.event.issue.state) || '' }}
            ${{ github.event_name == 'issue_comment' && format('**Latest Comment on Issue:** [{0}]({1})\n> {2}', github.event.issue.title, env.COMMENT_URL, env.LAST_COMMENT) || '' }}
            ${{ github.event_name == 'pull_request_review' && format('**PR Review:** [{0}]({1}) - {2}', github.event.pull_request.title, github.event.pull_request.html_url, github.event.review.state) || '' }}
            ${{ github.event_name == 'project_card' && format('**Project Card Update:** Card {0} to column: {1}', github.event.project_card.id, github.event.project_card.column_name) || '' }}
