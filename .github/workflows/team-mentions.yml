name: Auto Team Mentions
on:
  issues:
    types: [opened, labeled]

jobs:
  mention_team:
    runs-on: ubuntu-latest
    steps:
      - name: Check issue labels and mention teams
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const labels = issue.labels.map(label => label.name);
            let mentions = [];

            // Define label-to-team mappings
            if (labels.includes("Blue Team")) {
              mentions.push("@CryptoCaballeros/blue-team");
            }
            if (labels.includes("Red Team")) {
              mentions.push("@CryptoCaballeros/red-team");
            }
            if (labels.includes("Developers")) {
              mentions.push("@CryptoCaballeros/developers");
            }
            if (labels.includes("Everyone")) {
              mentions.push("@CryptoCaballeros/everyone");
            }
            if (labels.includes("Researchers")) { // FIXED TYPO HERE
              mentions.push("@CryptoCaballeros/researchers");
            }

             const comments = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number
              });
              
              const alreadyMentioned = comments.data.some(comment => comment.body.includes("this issue needs your attention!"));
              
              if (!alreadyMentioned && mentions.length > 0) {
                const mentionText = mentions.join(" ");
                github.rest.issues.createComment({
                  issue_number: issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: `🔔 Hey ${mentionText}, this issue needs your attention!`
                });
              }
            }
